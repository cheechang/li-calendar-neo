name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # 获取当前标签和前一个标签
          CURRENT_TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v "$CURRENT_TAG" | head -1)

          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            LOG_RANGE="${CURRENT_TAG}"
          fi

          echo "## 更新内容" > changelog.md
          echo "" >> changelog.md

          # 按类型分组提取提交
          FEAT=$(git log $LOG_RANGE --pretty=format:"- %s" | grep -i "^[\-]* *feat" | sed 's/^[- ]*feat[:/ ]*//i' || true)
          FIX=$(git log $LOG_RANGE --pretty=format:"- %s" | grep -i "^[\-]* *fix" | sed 's/^[- ]*fix[:/ ]*//i' || true)
          OTHER=$(git log $LOG_RANGE --pretty=format:"- %s" | grep -iv "^[\-]* *\(feat\|fix\)" || true)

          if [ -n "$FEAT" ]; then
            echo "### ✨ 新功能" >> changelog.md
            echo "$FEAT" >> changelog.md
            echo "" >> changelog.md
          fi
          if [ -n "$FIX" ]; then
            echo "### 🐛 修复" >> changelog.md
            echo "$FIX" >> changelog.md
            echo "" >> changelog.md
          fi
          if [ -n "$OTHER" ] && [ -z "$FEAT" ] && [ -z "$FIX" ]; then
            echo "$OTHER" >> changelog.md
            echo "" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "## 安装包" >> changelog.md
          echo "- **Windows**: 下载 \`.exe\` 安装程序" >> changelog.md
          echo "- **macOS**: 下载 \`.dmg\` 磁盘映像（支持 Intel 和 Apple Silicon）" >> changelog.md
          echo "- **Linux**: 下载 \`.deb\` 或 \`.AppImage\`" >> changelog.md

          # 将多行内容输出为 GitHub Actions 变量
          CHANGELOG_CONTENT=$(cat changelog.md)
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG_CONTENT" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: '松鼠日历 ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          args: ${{ matrix.args }}
          tauriScript: pnpm tauri
